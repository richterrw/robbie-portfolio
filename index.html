<!DOCTYPE html>
<html lang="en">
<head>

  <main class="hero">

      <h1 class="name">Robbie Richter</h1>

      <p class="role">
        <span class="role-dot" aria-hidden="true"></span>
        <span class="role-text">Actuarial Candidate</span>
      </p>

      <p class="tagline">I received my B.S. in Mathematics and Actuarial Science from Appalachian State University.</p>

      <div class="actions">
        <a class="btn" href="resume.pdf" target="_blank" rel="noopener" aria-label="Resume" title="Resume">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="8" y1="13" x2="16" y2="13" />
            <line x1="8" y1="17" x2="16" y2="17" />
            <line x1="8" y1="9" x2="11" y2="9" />
          </svg>
        </a>

        <a class="btn" href="https://www.linkedin.com/in/robert---richter" target="_blank" rel="noopener" aria-label="LinkedIn" title="LinkedIn">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
            <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />

        <a class="btn" href="https://github.com/richterrw" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />

        <a class="btn" href="mailto:robbierichter15@gmail.com" aria-label="Email" title="Email">

            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />

          </svg>
        </a>
      </div>
    </section>

    <footer class="footer">
      <span id="year"></span> Robbie Richter
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = '© ' + new Date().getFullYear();

    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Cursor-following spotlight
    const spotlight = document.querySelector('.spotlight');
    if (spotlight) {
      window.addEventListener('pointermove', (e) => {
        spotlight.style.setProperty('--x', e.clientX + 'px');
        spotlight.style.setProperty('--y', e.clientY + 'px');
      }, { passive: true });
    }

    // Subtle 3D tilt on the avatar
    const card = document.querySelector('.card');
    const tilt = document.querySelector('[data-tilt]');
    if (!reduce && window.matchMedia('(pointer: fine)').matches) {
      card.addEventListener('pointermove', (e) => {
        const r = card.getBoundingClientRect();
        const px = (e.clientX - r.left) / r.width - 0.5;
        const py = (e.clientY - r.top) / r.height - 0.5;
        tilt.style.transform = `rotateY(${px * 16}deg) rotateX(${-py * 16}deg)`;
      });
      card.addEventListener('pointerleave', () => { tilt.style.transform = ''; });
    }

    // Rotating role text
    const roleEl = document.querySelector('.role-text');
    if (roleEl && !reduce) {
      const roles = (roleEl.dataset.roles || '').split(',').map(s => s.trim()).filter(Boolean);
      if (roles.length > 1) {
        let i = 0;
        setInterval(() => {
          i = (i + 1) % roles.length;
          roleEl.style.opacity = '0';
          roleEl.style.transform = 'translateY(-6px)';
          setTimeout(() => {
            roleEl.textContent = roles[i];
            roleEl.style.opacity = '1';
            roleEl.style.transform = 'translateY(0)';
          }, 280);
        }, 2600);
      }
    }
  </script>
</body>
</html>
